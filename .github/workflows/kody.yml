# Goal-stabilization fork. Pinned to git+main of THIS repo (not npm latest)
# so changes merged into the fork are immediately live on the next tick —
# no npm publish round-trip required. Upstream merges back to
# aharonyaircohen/kody-engine via cross-repo PR when the goal completes.
#
# Required repo secrets: at least one model provider key (e.g. ANTHROPIC_API_KEY).
# Recommended: KODY_TOKEN PAT with `repo + workflow + read:org` scopes.

name: kody

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number (agent mode)"
        type: string
        default: ""
      sessionId:
        description: "Chat session ID (chat mode, from Kody-Dashboard)"
        type: string
        default: ""
      message:
        description: "Initial chat message (optional)"
        type: string
        default: ""
      model:
        description: "Model override (optional, e.g. anthropic/claude-haiku-4-5-20251001)"
        type: string
        default: ""
      dashboardUrl:
        description: "Dashboard event ingest URL with inline ?token=... (chat mode)"
        type: string
        default: ""
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: kody-${{ inputs.sessionId || inputs.issue_number || github.event.issue.number || github.sha }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Write pip cache key for LiteLLM
        run: echo "litellm[proxy]" > .kody-pip-requirements.txt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: .kody-pip-requirements.txt

      - name: Remove pip cache key file (avoid blocking branch switches)
        run: rm -f .kody-pip-requirements.txt

      - env:
          ALL_SECRETS:   ${{ toJSON(secrets) }}
          SESSION_ID:    ${{ inputs.sessionId }}
          INIT_MESSAGE:  ${{ inputs.message }}
          MODEL:         ${{ inputs.model }}
          DASHBOARD_URL: ${{ inputs.dashboardUrl }}
        # Git-pinned to this fork's main. Changes are live next tick.
        run: npx -y -p git+https://github.com/aguyaharonyair/kody-engine-stabilize.git#main kody
